      function parseBrowserBookmarks(markup) {
        const doc = new DOMParser().parseFromString(markup, "text/html");
        const result = [];
        const walk = (node, path = [], depth = 0) => {
          if (depth > 20 || result.length >= state.limit || !node?.children) return;
          let pendingFolder = "";
          for (const child of node.children) {
            if (result.length >= state.limit) break;
            const tag = child.tagName.toLowerCase();
            if (tag === "h3") pendingFolder = child.textContent.trim();
            else if (tag === "a") {
              const href = child.getAttribute("href") || "";
              if (/^https?:\/\//i.test(href)) result.push({ title: child.textContent.trim() || hostFor(href), url: href, category: path[path.length - 1] || "жөҸи§ҲеҷЁеҜје…Ҙ", description: "" });
            } else if (tag === "dl") {
              walk(child, pendingFolder ? [...path, pendingFolder] : path, depth + 1);
              pendingFolder = "";
            } else {
              const children = [...child.children];
              const folder = children.find((entry) => entry.tagName.toLowerCase() === "h3");
              const list = children.find((entry) => entry.tagName.toLowerCase() === "dl");
              if (list) walk(list, folder?.textContent.trim() ? [...path, folder.textContent.trim()] : path, depth + 1);
              else walk(child, path, depth + 1);
            }
          }
        };
        walk(doc.body);
        return result;
      }

      async function exportBookmarks() {
        try {
          const response = await fetch("/api/export", { credentials: "same-origin" });
          if (!response.ok) throw new Error("еҜјеҮәеӨұиҙҘпјҢиҜ·йҮҚж–°зҷ»еҪ•еҗҺеҶҚиҜ•");
          const blob = await response.blob();
          const link = document.createElement("a");
          link.href = URL.createObjectURL(blob);
          link.download = `lightmarks-${new Date().toISOString().slice(0, 10)}.json`;
          link.click();
          setTimeout(() => URL.revokeObjectURL(link.href), 1000);
          toast("еӨҮд»Ҫе·ІеҜјеҮә");
        } catch (error) { toast(error.message, true); }
      }

		if (item?.hasIcon) elements.bookmarkIconImage.src = `/api/bookmarks/${encodeURIComponent(item.id)}/icon?v=${encodeURIComponent(item.iconVersion || "1")}`;
		else elements.bookmarkIconImage.removeAttribute("src");
		updateIconEditor(item);
	  });
	  elements.iconDefaultButton.addEventListener("click", () => {
		if (pendingIconURL) URL.revokeObjectURL(pendingIconURL);
		pendingIconURL = "";
		pendingIconMode = "remove";
		pendingIconFile = null;
		elements.bookmarkIconImage.hidden = true;
		elements.bookmarkIconImage.removeAttribute("src");
		updateIconEditor();
	  });
	  elements.bookmarkTitle.addEventListener("input", () => { elements.bookmarkIconFallback.textContent = initialFor(elements.bookmarkTitle.value); });
	  elements.bookmarkURL.addEventListener("input", () => {
		elements.bookmarkIconPreview.className = `site-mark icon-preview tone-${toneFor(elements.bookmarkURL.value)}`;
		validateBookmarkURL(false);
	  });
	  elements.bookmarkURL.addEventListener("blur", () => { if (elements.bookmarkURL.value.trim()) validateBookmarkURL(true); });
	  elements.bookmarkURL.addEventListener("invalid", () => validateBookmarkURL(true));
	  elements.bookmarkCategory.addEventListener("focus", () => setCategoryCombobox(true));
	  elements.bookmarkCategory.addEventListener("input", () => {
		setCategoryCombobox(true, elements.bookmarkCategory.value);
	  });
	  elements.bookmarkCategory.addEventListener("keydown", (event) => {
		if (event.key === "Escape") setCategoryCombobox(false);
		if (event.key === "ArrowDown") {
		  event.preventDefault();
		  setCategoryCombobox(true);
		  elements.categoryComboboxList.querySelector(".combobox-option")?.focus();
		}
	  });
	  elements.categoryComboboxToggle.addEventListener("click", () => {
		const nextOpen = elements.categoryComboboxList.hidden;
		setCategoryCombobox(nextOpen);
		if (nextOpen) elements.bookmarkCategory.focus();
	  });
	  elements.categoryComboboxList.addEventListener("click", (event) => {
		const option = event.target.closest("[data-category]");
		if (!option) return;
		elements.bookmarkCategory.value = option.dataset.category;
		elements.bookmarkCategory.focus();
		setCategoryCombobox(false);
	  });
	  elements.categoryComboboxList.addEventListener("keydown", (event) => {
		const options = [...elements.categoryComboboxList.querySelectorAll(".combobox-option")];
		const index = options.indexOf(document.activeElement);
		if (event.key === "ArrowDown" || event.key === "ArrowUp") {
		  event.preventDefault();
		  const offset = event.key === "ArrowDown" ? 1 : -1;
		  options[(index + offset + options.length) % options.length]?.focus();
		}
		if (event.key === "Escape") {
		  elements.bookmarkCategory.focus();
		  setCategoryCombobox(false);
		}
	  });
	  elements.changePasswordButton.addEventListener("click", openPasswordDialog);
	  elements.noteButton.addEventListener("click", openNote);
	  elements.noteForm.addEventListener("submit", saveNote);
	  elements.noteText.addEventListener("input", updateNoteCount);
	  elements.clearNoteButton.addEventListener("click", () => {
		elements.noteText.value = "";
		updateNoteCount();
		elements.noteText.focus();
	  });
	  elements.passwordForm.addEventListener("submit", changePassword);
	  elements.passwordDialog.addEventListener("close", () => {
		elements.passwordForm.reset();
		elements.passwordError.textContent = "";
	  });
      elements.settingsAddButton.addEventListener("click", () => { elements.settingsDialog.close(); openAddDialog(); });
      $("#checkButton").addEventListener("click", () => { elements.settingsDialog.close(); startHealthCheck(true); });
      $("#importButton").addEventListener("click", () => { elements.settingsDialog.close(); elements.importFile.click(); });
      elements.importFile.addEventListener("change", () => importFile(elements.importFile.files[0]));
      $("#exportButton").addEventListener("click", exportBookmarks);
      elements.backgroundButton.addEventListener("click", () => elements.backgroundFile.click());
      elements.backgroundFile.addEventListener("change", () => uploadBackground(elements.backgroundFile.files[0]));
      elements.clearBackgroundButton.addEventListener("click", clearBackground);
      elements.bookmarkForm.addEventListener("submit", saveBookmark);
      elements.confirmDelete.addEventListener("click", deleteBookmark);
      elements.prevPage.addEventListener("click", () => { state.page--; renderGroups(); window.scrollTo({ top: 180, behavior: "smooth" }); });
      elements.nextPage.addEventListener("click", () => { state.page++; renderGroups(); window.scrollTo({ top: 180, behavior: "smooth" }); });
      elements.themeButton.addEventListener("click", () => applyTheme(document.documentElement.dataset.theme === "dark" ? "light" : "dark"));
	  $("#logoutButton").addEventListener("click", async () => { await api("/api/logout", { method: "POST" }); elements.settingsDialog.close(); showLogin(); });
      document.querySelectorAll("[data-close-settings]").forEach((button) => button.addEventListener("click", () => elements.settingsDialog.close()));
	  elements.settingsDialog.addEventListener("click", (event) => {
		if (event.target !== elements.settingsDialog) return;
		const rect = elements.settingsDialog.getBoundingClientRect();
		const inside = event.clientX >= rect.left && event.clientX <= rect.right && event.clientY >= rect.top && event.clientY <= rect.bottom;
		if (!inside) elements.settingsDialog.close();
	  });
	  elements.settingsDialog.addEventListener("close", () => {
		if (settingsDirty) {
		  applySiteName(state.siteName);
		  applySiteSubtitle(state.siteSubtitle);
		  applyTimeZone(state.timeZone);
		  applyGlass(state);
		}
		settingsDirty = false;
	  });
	  document.querySelectorAll("[data-close-password]").forEach((button) => button.addEventListener("click", () => elements.passwordDialog.close()));
	  document.querySelectorAll("[data-close-note]").forEach((button) => button.addEventListener("click", () => elements.noteDialog.close()));
      document.querySelectorAll("[data-close-dialog]").forEach((button) => button.addEventListener("click", () => elements.bookmarkDialog.close()));
	  elements.bookmarkDialog.addEventListener("close", () => {
		if (pendingIconURL) URL.revokeObjectURL(pendingIconURL);
		pendingIconURL = "";
		pendingIconFile = null;
		setCategoryCombobox(false);
		clearURLValidation();
	  });
      document.querySelectorAll("[data-close-delete]").forEach((button) => button.addEventListener("click", () => elements.deleteDialog.close()));
	  document.addEventListener("pointerdown", (event) => { if (!event.target.closest("#categoryCombobox")) setCategoryCombobox(false); });
      document.addEventListener("keydown", (event) => { if (event.key === "/" && !["INPUT", "TEXTAREA", "SELECT"].includes(document.activeElement.tagName)) { event.preventDefault(); elements.searchInput.focus(); } });

      boot();
    })();
  </script>
</body>
</html>
